<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>task.md - Quiet Workbench</title>
    <link rel="stylesheet" href="/styles.css?v=doc-pages">
  </head>
  <body data-document-kind="task">
    <main class="detail-shell quiet-shell">
      <header class="detail-header quiet-topbar">
        <a class="back-link nav-button" href="/">返回</a>
        <div>
          <p class="eyebrow">Task Folder Document</p>
          <h1 id="documentTitle">task.md</h1>
          <p id="documentPath" class="detail-path"></p>
        </div>
        <div class="detail-actions">
          <button id="saveDocumentButton" type="button">保存 task.md</button>
          <button id="copyContextButton" type="button">复制 Agent Context</button>
          <button id="downloadContextButton" type="button">下载 Agent Context</button>
        </div>
      </header>
      <section class="document-grid">
        <aside class="quiet-sidebar" id="documentNav"></aside>
        <section class="document-panel">
          <div id="documentStatus" class="status-text">加载中。</div>
          <div id="contextReadiness" class="context-readiness"></div>
          <textarea id="documentEditor" rows="30"></textarea>
        </section>
      </section>
    </main>
    <script src="/document.js?v=doc-pages"></script>
  </body>
</html>
