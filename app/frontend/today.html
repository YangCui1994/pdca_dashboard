<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>今日 PDCA - Quiet Workbench</title>
    <link rel="stylesheet" href="/styles.css?v=quiet-workbench">
  </head>
  <body>
    <main class="quiet-shell">
      <header class="quiet-topbar">
        <div>
          <p class="eyebrow">Quiet Workbench</p>
          <h1>今日 PDCA</h1>
          <p>把当天和本周事项转成可检查的 Plan、Do、Check、Act。</p>
        </div>
        <nav class="topbar-actions segmented-actions" aria-label="页面导航">
          <a class="nav-button" href="/">全部事项</a>
          <button id="refreshToday" type="button">刷新</button>
        </nav>
      </header>

      <section class="quiet-layout">
        <aside class="quiet-sidebar">
          <a class="nav-item" href="/">全部事项</a>
          <a class="nav-item active" href="/today.html">今日 PDCA</a>
          <div class="nav-note">Plan / Do / Check / Act 先过 Gate，再进入任务上下文。</div>
        </aside>

        <div class="quiet-main">
          <section class="progress-card">
            <div class="section-heading">
              <div>
                <p class="eyebrow">Daily Sheet</p>
                <h2>今日工作先变成可检查事件</h2>
              </div>
              <strong id="todayCount">0</strong>
            </div>
            <div class="progress-track"><div class="progress-fill" id="todayProgress"></div></div>
          </section>

          <section class="callout-card" id="pdcaCallout">
            <div class="callout soft-green">
              <span>✓</span><span>Do 只记录已发生、可验证的动作。</span><button type="button">PDCA Gate</button>
            </div>
            <div class="callout soft-amber">
              <span>◉</span><span>判断、情绪和归因会被标记为 bias_or_judgment。</span><button type="button">补证据</button>
            </div>
          </section>

          <section class="today-grid">
            <section class="panel">
              <h2>今日/本周事项</h2>
              <div id="todayList" class="today-list"></div>
            </section>
            <section class="panel">
              <label>
                标题
                <input id="titleInput" type="text" value="今日 PDCA 输入">
              </label>
              <label>
                原始输入
                <textarea id="rawInput" rows="14" placeholder="写下今天计划、已经做过的动作、观察到的结果、需要调整的下一步"></textarea>
              </label>
              <div class="actions">
                <button data-action="pdca_gate" type="button">PDCA Gate</button>
                <button data-action="daily_review" type="button">生成日复盘</button>
                <button data-action="structure_capture" type="button">整理成卡片</button>
              </div>
              <div id="statusText" class="status-text">等待输入。</div>
              <label>
                AI 输出
                <textarea id="aiOutput" rows="16"></textarea>
              </label>
              <div class="saved-path" id="savedPath"></div>
            </section>
          </section>
        </div>
      </section>
    </main>
    <script src="/today.js?v=quiet-workbench"></script>
  </body>
</html>
