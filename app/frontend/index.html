<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>全部事项 - Quiet Workbench</title>
    <link rel="stylesheet" href="/styles.css?v=quiet-workbench">
  </head>
  <body>
    <main class="quiet-shell">
      <header class="quiet-topbar">
        <div>
          <p class="eyebrow">Quiet Workbench</p>
          <h1>全部事项</h1>
          <p>按状态查看卡点、已有基础和最近事件。</p>
        </div>
        <nav class="topbar-actions segmented-actions" aria-label="页面导航">
          <a class="nav-button" href="/today.html">今日 PDCA</a>
          <button id="refreshItems" type="button">刷新</button>
        </nav>
      </header>

      <section class="quiet-layout">
        <aside class="quiet-sidebar" id="statusOverview"></aside>
        <div class="quiet-main">
          <section class="progress-card">
            <div class="section-heading">
              <div>
                <p class="eyebrow">Vault Overview</p>
                <h2>Today’s workbench is taking shape</h2>
              </div>
              <strong id="totalCount">0</strong>
            </div>
            <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
          </section>

          <section class="callout-card" id="boardCallouts"></section>

          <section class="badge-card">
            <div class="section-heading">
              <div>
                <p class="eyebrow">Status</p>
                <h2>当前任务分布</h2>
              </div>
            </div>
            <div class="badges" id="vaultOverview"></div>
          </section>

          <section class="panel new-task-panel">
            <div class="section-heading">
              <div>
                <p class="eyebrow">Capture</p>
                <h2>新建任务</h2>
              </div>
              <strong id="newTaskStatus">未提交</strong>
            </div>
            <form id="newTaskForm" class="new-task-form">
              <label>
                标题
                <input id="newTaskTitle" type="text" placeholder="例如：Tushare 数据 smoke test">
              </label>
              <label>
                内容
                <textarea id="newTaskInput" rows="5" placeholder="写下原始问题、已有基础、下一步或想让 AI 整理的碎片。"></textarea>
              </label>
              <div class="actions">
                <button id="createTaskButton" type="submit">新建任务</button>
              </div>
            </form>
          </section>

          <section class="panel filter-panel">
            <label>
              状态
              <select id="statusFilter">
                <option value="all">全部</option>
                <option value="inbox">收件箱</option>
                <option value="active">推进中</option>
                <option value="waiting">等待</option>
                <option value="done">完成</option>
                <option value="archive">归档</option>
              </select>
            </label>
            <label>
              日期
              <select id="dateFilter">
                <option value="all">全部</option>
                <option value="today">今天</option>
                <option value="week">本周</option>
                <option value="undated">无日期</option>
              </select>
            </label>
            <label>
              标签
              <input id="tagFilter" type="text" placeholder="输入标签关键词">
            </label>
            <label>
              卡点
              <select id="blockerFilter">
                <option value="all">全部</option>
                <option value="blocked">有卡点</option>
                <option value="ready">已有基础且无卡点</option>
              </select>
            </label>
          </section>

          <section class="board-panel is-full">
            <div class="board-grid" id="boardGrid"></div>
          </section>
        </div>
      </section>
    </main>
    <script src="/app.js?v=quiet-workbench"></script>
  </body>
</html>
